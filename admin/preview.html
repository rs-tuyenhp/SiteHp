<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Template — Nexora AI</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/styles.css" />
  <link rel="stylesheet" href="admin.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%2314F195'/%3E%3Cpath d='M16 6l8 5v10l-8 5-8-5V11z' fill='none' stroke='white' stroke-width='2'/%3E%3Ccircle cx='16' cy='16' r='3' fill='white'/%3E%3C/svg%3E" />
</head>
<body class="display-body">
  <!-- Control bar -->
  <div class="display-bar">
    <a href="/" class="brand" aria-label="Nexora AI">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 2l8 4.5v9L12 20l-8-4.5v-9L12 2z" stroke="#fff" stroke-width="1.6" stroke-linejoin="round"/><circle cx="12" cy="11" r="2.4" fill="#fff"/></svg>
      </span>
      Nexora<span style="color:var(--secondary)">AI</span>
    </a>
    <span class="tag">Live template</span>

    <span class="spacer"></span>

    <span class="display-status"><span class="dot" id="disp-dot"></span><span id="disp-status">Loading…</span></span>
    <button type="button" class="btn btn-ghost btn-sm" id="btn-refresh">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M21 12a9 9 0 1 1-2.6-6.3M21 4v5h-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Refresh
    </button>
    <a href="index.html" class="btn btn-primary btn-sm">Edit template</a>
  </div>

  <!-- The saved template renders here (scripts included) -->
  <iframe id="stage" class="display-stage" title="Published template" referrerpolicy="no-referrer-when-downgrade"></iframe>

  <script src="config.js"></script>
  <script src="preview.js" defer></script>
</body>
</html>
